#cloud-config
# Hetzner "user data" / cloud-init for the Network Inventory & Management Platform.
# Paste this into the "Cloud config" field when creating the server.
# BEFORE USING: replace the ssh_authorized_keys line with YOUR public key
# (the contents of ~/.ssh/id_ed25519.pub), and adjust the timezone.

package_update: true
package_upgrade: true

packages:
  - git
  - nginx
  - ufw
  - fail2ban
  - unattended-upgrades

timezone: America/Chicago

# A sudo login user (key-only). Add your real public key below.
users:
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ssh-ed25519 AAAAREPLACE_WITH_YOUR_PUBLIC_KEY you@yourmachine

# Turn on automatic security updates
write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

runcmd:
  # Unprivileged system user that runs the app
  - [ bash, -c, "id -u netinv >/dev/null 2>&1 || adduser --system --group --home /opt/netinv netinv" ]
  # Harden SSH: no root password login, no password auth (keys only)
  - [ bash, -c, "sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config" ]
  - [ bash, -c, "sed -i 's/^#\\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config" ]
  - [ bash, -c, "systemctl restart ssh || systemctl restart sshd || true" ]
  # Host firewall (defense-in-depth alongside the Hetzner Cloud Firewall)
  - [ ufw, allow, OpenSSH ]
  - [ ufw, allow, "80/tcp" ]
  - [ ufw, allow, "443/tcp" ]
  - [ bash, -c, "ufw --force enable" ]
  - [ systemctl, enable, --now, fail2ban ]
