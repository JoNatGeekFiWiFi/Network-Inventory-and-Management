<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Inventory &amp; Management</title>
  <script>/* apply saved theme before first paint to avoid a light-mode flash */
    try { var t = localStorage.getItem('theme'); if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t; } catch (e) {}
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><i class="ti ti-network"></i> <span>Network Inventory</span> <span class="env">testing</span></div>
    <div class="spacer"></div>
    <div class="themeseg" id="themeSeg" title="Color theme">
      <button data-t="light" onclick="setTheme('light')" title="Always light">Light</button>
      <button data-t="dark" onclick="setTheme('dark')" title="Always dark">Dark</button>
      <button data-t="auto" onclick="setTheme('auto')" title="Follow this device's setting">Auto</button>
    </div>
    <div id="userMenu" class="usermenu"></div>
  </header>
  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <a href="#/sites" data-nav="sites"><i class="ti ti-map-pin"></i> Sites</a>
      <a href="#/accounts" data-nav="accounts"><i class="ti ti-building-bank"></i> Accounts</a>
      <a href="#/customers" data-nav="customers"><i class="ti ti-users"></i> Customers</a>
      <a href="#/inventory" data-nav="inventory"><i class="ti ti-router"></i> Inventory</a>
      <a href="#/zerotier" data-nav="zerotier" id="navZt" style="display:none"><i class="ti ti-network"></i> ZeroTier</a>
      <a href="#/blocklist" data-nav="blocklist" id="navBlock" style="display:none"><i class="ti ti-shield-x"></i> Blocklist</a>
      <a href="#/batch" data-nav="batch" id="navBatch" style="display:none"><i class="ti ti-stack-2"></i> Batch config</a>
      <a href="#/access" data-nav="access" id="navAccess" style="display:none"><i class="ti ti-id-badge-2"></i> Site Access</a>
      <a href="#/billing" data-nav="billing" id="navBilling" style="display:none"><i class="ti ti-file-invoice"></i> Billing</a>
      <a href="#/tickets" data-nav="tickets" id="navTickets" style="display:none"><i class="ti ti-lifebuoy"></i> Support</a>
      <a href="#/activity" data-nav="activity"><i class="ti ti-history"></i> Activity</a>
      <a href="#/models" data-nav="models" id="navModels" style="display:none"><i class="ti ti-list-details"></i> Models</a>
      <a href="#/packages" data-nav="packages" id="navPackages" style="display:none"><i class="ti ti-package"></i> Packages</a>
      <a href="#/settings" data-nav="settings" id="navSettings" style="display:none"><i class="ti ti-settings"></i> Settings</a>
      <a href="#/users" data-nav="users" id="navUsers" style="display:none"><i class="ti ti-user-shield"></i> Users</a>
    </nav>
    <main id="view" class="content"><div class="loading">Loading…</div></main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
